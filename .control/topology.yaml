# .control/topology.yaml — Repository topology map for healthOS Platform
# Describes all apps, packages, and their relationships.
# Last updated: 2026-03-18 (validated against local dev session)
#
# Legend for status field (from 2026-03-18 dev session):
#   healthy   = verified working in local dev
#   degraded  = starts but has issues
#   stale     = next-forge leftover, needs rework or removal

apps:
  health:
    path: "apps/health"
    description: "Health intelligence dashboard — Garmin tools, biometric analysis, AI chat with Claude Haiku 4.5"
    port: 3011
    risk: high
    domain: health
    status: healthy  # 2026-03-18: "Hola Carlos" health AI chat working
    dependencies:
      - "@repo/auth"
      - "@repo/database"
      - "@repo/ai"
      - "@repo/design-system"
      - "@repo/health-tools"

  chat:
    path: "apps/chat"
    description: "AI-powered chat agent — multi-provider (GPT-5 nano, etc.), branching, MCP, Write/Learn/Code categories"
    port: 3010
    risk: high
    domain: health+ai
    status: healthy  # 2026-03-18: AI chat with sign-in working
    dependencies:
      - "@repo/auth"
      - "@repo/database"
      - "@repo/ai"
      - "@repo/design-system"
      - "@repo/health-tools"

  app:
    path: "apps/app"
    description: "Shell application (next-forge default, placeholder — no root page)"
    port: 3000
    risk: low
    domain: dashboard
    status: healthy  # 2026-03-18: proxy fixed, 404 expected (no root page)
    notes: "Auth proxy.ts bug fixed 2026-03-18 — was returning undefined, now wraps callbacks properly"
    dependencies:
      - "@repo/auth"
      - "@repo/database"
      - "@repo/design-system"
      - "@repo/observability"
      - "@repo/analytics"
      - "@repo/feature-flags"
      - "@repo/notifications"
      - "@repo/payments"
      - "@repo/security"
      - "@repo/collaboration"

  api:
    path: "apps/api"
    description: "API server + Stripe webhooks (404 on root is expected — endpoints on sub-paths)"
    port: 3002
    risk: high
    domain: api
    status: healthy  # 2026-03-18: 404 on root expected
    dependencies:
      - "@repo/auth"
      - "@repo/database"
      - "@repo/observability"
      - "@repo/rate-limit"
      - "@repo/security"
      - "@repo/webhooks"

  web:
    path: "apps/web"
    description: "Marketing website (Next.js) — requires BASEHUB_TOKEN for CMS layout"
    port: 3001
    risk: low
    domain: marketing
    status: degraded  # 2026-03-18: NEEDS BASEHUB_TOKEN, CMS layout fails
    notes: "@repo/cms needs BASEHUB_TOKEN. Without it the layout component throws."
    dependencies:
      - "@repo/design-system"
      - "@repo/seo"
      - "@repo/analytics"
      - "@repo/cms"

  docs:
    path: "apps/docs"
    description: "Public documentation site (Mintlify)"
    port: 3004
    risk: low
    domain: docs
    status: healthy  # 2026-03-18: Mintlify docs working
    dependencies: []

  email:
    path: "apps/email"
    description: "Email templates (React Email)"
    port: 3003
    risk: low
    domain: email
    status: healthy  # 2026-03-18: React Email preview working
    dependencies:
      - "@repo/email"

  storybook:
    path: "apps/storybook"
    description: "Component library explorer (Storybook 10)"
    port: 6006
    risk: low
    domain: design
    status: healthy  # 2026-03-18: Storybook component library working
    dependencies:
      - "@repo/design-system"

  studio:
    path: "apps/studio"
    description: "Database studio — STALE: expects Prisma but project uses Drizzle ORM"
    port: 5555
    risk: medium
    domain: database
    status: stale  # 2026-03-18: next-forge leftover, use drizzle-kit studio instead
    notes: "Use 'cd packages/database && bunx drizzle-kit studio' instead of this app"
    dependencies:
      - "@repo/database"

packages:
  ai:
    path: "packages/ai"
    description: "AI SDK v6 multi-provider gateway (Anthropic, OpenAI, Google, Ollama) + ToolLoopAgent"
    domain: ai

  analytics:
    path: "packages/analytics"
    description: "Analytics (PostHog / Vercel)"
    domain: observability

  auth:
    path: "packages/auth"
    description: "Authentication (Better Auth — Google, GitHub, anonymous). NOT Clerk."
    domain: auth
    notes: |
      proxy.ts provides a stub that mimics Clerk's middleware signature
      so next-forge proxy files work. Bug fixed 2026-03-18: was returning
      undefined, now wraps callback as (request, event) => callback({}, request, event).
      keys.ts validates: BETTER_AUTH_SECRET, BETTER_AUTH_URL, GOOGLE_CLIENT_ID/SECRET, GITHUB_CLIENT_ID/SECRET

  cms:
    path: "packages/cms"
    description: "Content management (BaseHub) — requires BASEHUB_TOKEN"
    domain: content
    notes: "Without BASEHUB_TOKEN, apps/web layout fails to render"

  collaboration:
    path: "packages/collaboration"
    description: "Real-time collaboration (Liveblocks)"
    domain: collaboration

  database:
    path: "packages/database"
    description: "Drizzle ORM + Neon PostgreSQL (NOT Prisma)"
    domain: database
    risk: high
    notes: |
      Neon project: healthos-platform (purple-mouse-62653625, aws-us-east-1)
      Schema: packages/database/schema.ts (16 tables)
      Config: packages/database/drizzle.config.ts
      Connection: drizzle-orm/postgres-js via postgres driver
      Tables: user, session, account, verification, chat, message, vote,
              document, suggestion, stream, project, userCredit, userPreference,
              healthBaseline, subscription, conversationMemory, team,
              teamMember, documentShare

  design-system:
    path: "packages/design-system"
    description: "UI components (shadcn/ui + Tailwind CSS v4)"
    domain: design

  email:
    path: "packages/email"
    description: "Email sending (Resend)"
    domain: email

  feature-flags:
    path: "packages/feature-flags"
    description: "Feature flags (Vercel Flags)"
    domain: infra

  health-tools:
    path: "packages/health-tools"
    description: "Garmin health tools — query, snapshot, sleep, training, vitals, nutrition correlation"
    domain: health
    risk: low

  internationalization:
    path: "packages/internationalization"
    description: "i18n (next-intl)"
    domain: infra

  next-config:
    path: "packages/next-config"
    description: "Shared Next.js configuration"
    domain: infra

  notifications:
    path: "packages/notifications"
    description: "Push notifications (Knock)"
    domain: notifications

  observability:
    path: "packages/observability"
    description: "Logging, error tracking, monitoring (Sentry)"
    domain: observability

  payments:
    path: "packages/payments"
    description: "Billing (Stripe) — Stripe CLI not yet installed locally"
    domain: billing

  rate-limit:
    path: "packages/rate-limit"
    description: "Rate limiting (Arcjet)"
    domain: security

  security:
    path: "packages/security"
    description: "Security headers and middleware"
    domain: security

  seo:
    path: "packages/seo"
    description: "SEO metadata and sitemap generation"
    domain: marketing

  storage:
    path: "packages/storage"
    description: "File storage (Vercel Blob)"
    domain: storage

  typescript-config:
    path: "packages/typescript-config"
    description: "Shared TypeScript configuration"
    domain: infra

  webhooks:
    path: "packages/webhooks"
    description: "Webhook handling (Svix)"
    domain: api

knowledge:
  entry_point: "docs/_index.md"
  architecture: "docs/architecture/"
  decisions: "docs/decisions/"
  runbooks: "docs/runbooks/"
  api_contracts: "docs/api-contracts/"
  schemas: "docs/schemas/"

# ─── Infrastructure ─────────────────────────────────────────

infrastructure:
  database:
    provider: "Neon Serverless PostgreSQL"
    project: "healthos-platform"
    project_id: "purple-mouse-62653625"
    region: "aws-us-east-1"
    orm: "Drizzle ORM (NOT Prisma)"

  auth:
    provider: "Better Auth"
    methods: ["Google OAuth", "GitHub OAuth", "Anonymous sessions"]
    notes: "NOT Clerk — docs referencing Clerk are stale"

  deployment:
    provider: "Vercel (planned)"
    cli_auth: "carlos-broomva-tech"
    projects_linked: false

  secrets:
    generated:
      - AUTH_SECRET
      - BETTER_AUTH_SECRET
      - CRON_SECRET
      - MCP_ENCRYPTION_KEY
    method: "openssl rand -base64 32"
