# .control/commands.yaml — Canonical commands for healthOS Platform
# Each command maps to a harness script in scripts/harness/.
# Last updated: 2026-03-18 (corrected ORM references from Prisma to Drizzle)

commands:
  smoke:
    description: "Quick validation: install, check, build the main app"
    script: "scripts/harness/smoke.sh"
    timeout: 120
    usage: "make -f Makefile.control smoke"
    when: "Before starting work, after pulling changes"

  check:
    description: "Lint (biome via ultracite) + typecheck (tsc --noEmit)"
    script: "scripts/harness/check.sh"
    timeout: 60
    usage: "make -f Makefile.control check"
    when: "Before committing, after any code change"

  test:
    description: "Run vitest test suite"
    script: "bun run test"
    timeout: 180
    usage: "make -f Makefile.control test"
    when: "Before pushing, after logic changes"

  build:
    description: "Full Turborepo build (runs tests first via turbo dependency)"
    script: "bun run build"
    timeout: 300
    usage: "make -f Makefile.control build"
    when: "Before deploy, to verify everything compiles"

  ci:
    description: "Full CI pipeline: check + test + build"
    script: "scripts/harness/ci.sh"
    timeout: 600
    usage: "make -f Makefile.control ci"
    when: "Simulating the full CI pipeline locally"

  docs-check:
    description: "Verify documentation freshness and index coverage"
    script: "scripts/harness/check-docs-freshness.sh"
    timeout: 10
    usage: "make -f Makefile.control docs-check"
    when: "After modifying any file in docs/"

  deploy:
    description: "Deploy to Vercel (requires VERCEL_TOKEN)"
    script: "vercel --prod"
    timeout: 300
    usage: "make -f Makefile.control deploy"
    when: "After all CI checks pass and PR is approved"
    notes: "Vercel CLI authenticated (carlos-broomva-tech) but no projects linked yet"

  migrate:
    description: "Run Drizzle Kit push to apply schema changes to the database"
    script: "cd packages/database && bunx drizzle-kit push"
    timeout: 60
    usage: "bun run db:push"
    when: "After packages/database/schema.ts changes"
    notes: |
      ORM is Drizzle (NOT Prisma). Schema defined in packages/database/schema.ts.
      Config in packages/database/drizzle.config.ts.
      For generating migration SQL files: bunx drizzle-kit generate
      For applying migration files: bunx drizzle-kit migrate

  migrate-generate:
    description: "Generate Drizzle migration SQL files from schema diff"
    script: "cd packages/database && bunx drizzle-kit generate"
    timeout: 30
    usage: "cd packages/database && bunx drizzle-kit generate"
    when: "When creating versioned migration files for production"

  studio:
    description: "Open Drizzle Kit Studio for database inspection"
    script: "cd packages/database && bunx drizzle-kit studio"
    timeout: 0  # runs indefinitely
    usage: "cd packages/database && bunx drizzle-kit studio"
    when: "Inspecting or debugging database contents"
    notes: "apps/studio (Prisma Studio) is a next-forge leftover; use drizzle-kit studio instead"
